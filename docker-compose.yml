version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traceurl-web
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # - NEXT_PUBLIC_API_URL=http://localhost:8080/api # example env variable
